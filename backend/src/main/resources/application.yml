spring:
  application:
    name: consult

  datasource:
    # Overridden on Render via SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD env vars.
    url: jdbc:postgresql://localhost:5433/consult
    username: consult
    password: consult

  jpa:
    # Flyway owns the schema; Hibernate must never generate or alter it.
    hibernate:
      ddl-auto: none
    open-in-view: false

  mvc:
    problemdetails:
      enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  # Idempotent demo seeder: generates bookable slots for the seeded doctors on startup.
  seed-slots: true
  cors:
    # Comma-separated origins allowed to call /api/** cross-origin, e.g. the Cloudflare
    # UI URL, no trailing slash. Empty = CORS disabled (the UI served from the jar is
    # same-origin and needs none). Set via the CORS_ALLOWED_ORIGINS env var.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
